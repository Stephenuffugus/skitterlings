<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1140"/>
      <stop offset="1" stop-color="#0e1326"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7be0ff"/>
      <stop offset="1" stop-color="#5ce1e6"/>
    </linearGradient>
  </defs>
  <!-- maskable safe-zone friendly: full-bleed background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- ground line -->
  <rect x="64" y="372" width="384" height="10" rx="5" fill="#ff6ea9" opacity="0.8"/>
  <!-- little skitterling, mid-hop -->
  <g transform="translate(256 250)">
    <!-- antennae -->
    <g stroke="#2a8f97" stroke-width="10" stroke-linecap="round">
      <line x1="-30" y1="-92" x2="-46" y2="-128"/>
      <line x1="30" y1="-92" x2="46" y2="-128"/>
    </g>
    <circle cx="-46" cy="-132" r="11" fill="#ffce4a"/>
    <circle cx="46" cy="-132" r="11" fill="#ffce4a"/>
    <!-- body -->
    <rect x="-78" y="-92" width="156" height="150" rx="64" fill="url(#body)" stroke="#15323a" stroke-width="8"/>
    <!-- belly -->
    <rect x="-40" y="-30" width="80" height="74" rx="34" fill="#e9fbff"/>
    <!-- eyes -->
    <circle cx="-26" cy="-34" r="18" fill="#fff"/><circle cx="-19" cy="-31" r="9" fill="#15323a"/>
    <circle cx="30" cy="-34" r="18" fill="#fff"/><circle cx="37" cy="-31" r="9" fill="#15323a"/>
    <!-- smile -->
    <path d="M -16 14 q 18 18 36 0" fill="none" stroke="#15323a" stroke-width="7" stroke-linecap="round"/>
    <!-- hopping legs -->
    <g stroke="#2a8f97" stroke-width="16" stroke-linecap="round">
      <line x1="-34" y1="56" x2="-52" y2="92"/>
      <line x1="34" y1="56" x2="58" y2="84"/>
    </g>
  </g>
  <!-- a couple of stars -->
  <g fill="#ffce4a">
    <circle cx="110" cy="120" r="5"/><circle cx="402" cy="150" r="6"/><circle cx="360" cy="92" r="4"/>
  </g>
</svg>
